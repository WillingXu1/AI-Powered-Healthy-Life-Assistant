knowledge:
  storage:
  # 可选：配置知识库存储根目录（绝对路径或相对运行目录）
  # 不配置时默认使用项目路径 backend/src/main/resources/knowledge
   root: D:\A_Studying\StudyForWork\work_12_18\HealthyLifeAiHealthAssistant-master\backend\src\main\resources\knowledge

# mybatis-plus配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

  # sa-token配置
  sa-token:
    # token名称 (同时也是cookie名称)
    token-name: satoken
    # token有效期，单位s 默认30天, -1代表永不过期
    timeout: 2592000
    # token临时有效期 (指定时间内无操作就视为token过期) 单位: 秒
    activity-timeout: -1
    # 是否允许同一账号并发登录 (为true时允许一起登录, 为false时新登录挤掉旧登录)
    allow-concurrent-login: true
    # 在多人登录同一账号时，是否共用一个token (为true时所有登录共用一个token, 为false时每次登录新建一个token)
    is-share: false
    # token风格
    token-style: uuid
    # 是否输出日志
    is-log: true

# 日志配置
logging:
  level:
    world.world.xuewei.dao.mapper: debug
# springdoc-openapi项目配置

#  SpringDoc：自动扫描代码，生成OpenAPI规范
#  OpenAPI：文档标准格式（JSON）
#  Knife4j：美化界面，让文档更好看
springdoc:
  version: 1.0.0
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: "default"
      paths-to-match: "/**"
      packages-to-scan: com.zz.health.controller
# knife4j的增强配置，不需要增强可以不配
knife4j:
  enable: true
  api:
    title: "健康人生AI健康助手 API 文档"
