app:
  ollama:
    timeout:
      retrieval: 5       # 向量检索超时5秒
      inference: 30      # 模型推理超时30秒
    limits:
      context-chars: 800      # 上下文最大800字符
      similarity-results: 3   # 只取前3个相似结果
      max-prompt-length: 1500 # 总prompt限制
    fallback:
      enabled: true
      message: "系统处理中，请稍后查看结果"

server:
  port: 9999
spring:
  ai:
    ollama:
      base-url: http://localhost:11434

      # Chat模型配置
      chat:
        options:
          model: qwen2.5:0.5b  # 此电脑只能使用0.5b的模型！！！！！
          temperature: 0.8
          num-predict: 512
          num-batch: 16
          num-ctx: 4096
          top-p: 0.9
          top-k: 40
          num-thread: 6
          repeat-last-n: 64
          repeat-penalty: 1.1
          mirostat: 2

      # Embedding模型配置
      embedding:
        options:
          model: nomic-embed-text:latest
        # Embedding专用的超时设置
        client:
          connect-timeout: 30s
          read-timeout: 120s

      # 全局超时设置（对chat和embedding都有效）
      client:
        connect-timeout: 50s
        read-timeout: 500s
        response-timeout: 500s



  application:
    name: "Healthy Life AI Health Assistant"
    description: "健康人生AI健康助手"
  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/healthy_life_ai_health_assistant?serverTimezone=Hongkong&useAffectedRows=true&characterEncoding=utf-8
    username: root               #数据库用户名
    password: 123456               #数据库密码
    type: com.alibaba.druid.pool.DruidDataSource
    initialSize: 5 # 初始化时创建的连接数
    minIdle: 5 # 最小空闲连接数
    maxActive: 20 # 最大活跃连接数
    testWhileIdle: true # 是否在空闲时测试连接的有效性
    validationQuery: SELECT 1 FROM DUAL # 验证连接的查询语句
    timeBetweenEvictionRunsMillis: 60000 # 检查连接是否空闲的时间间隔
    minEvictableIdleTimeMillis: 300000 # 连接在池中最小生存时间

  # JPA配置
  jpa:
    database-platform: org.hibernate.dialect.MySQL8Dialect
    hibernate:
      ddl-auto: update  # 开发环境用update，生产用validate
    properties:
      hibernate:
        format_sql: true
        show_sql: true
    open-in-view: false

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
